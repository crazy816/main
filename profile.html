<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Micro-Mentor</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body data-page="profile">
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon" style="width: 32px; height: 32px;"></div>
                <span class="logo-name">Micro-Mentor</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Dashboard
                </a>
                <a href="chats.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    My Chats
                </a>
                <a href="mentors.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Find Mentors
                </a>
                <a href="profile.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Profile
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="nav-item" onclick="App.logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="dashboard-content">
            <div class="dashboard-header">
                <h1 class="dashboard-title">Profile Settings</h1>
                <p class="dashboard-subtitle">Manage your account and preferences.</p>
            </div>
            
            <div class="info-card" style="max-width: 600px;">
                <form id="profileForm" onsubmit="handleProfileUpdate(event)">
                    <div class="form-group">
                        <label for="profileName">Full Name</label>
                        <input type="text" id="profileName" name="name" placeholder="Your name">
                    </div>
                    
                    <div class="form-group">
                        <label for="profileEmail">Email</label>
                        <input type="email" id="profileEmail" name="email" placeholder="your@email.com" disabled style="background: #f5f5f5;">
                        <small style="color: var(--text-muted);">Email cannot be changed</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="profileBio">Bio</label>
                        <textarea id="profileBio" name="bio" rows="4" placeholder="Tell others about yourself and what you're looking to learn or share..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Your Role</label>
                        <div style="display: flex; gap: 12px; margin-top: 8px;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="radio" name="userRole" value="mentee" checked>
                                <span>Mentee (Learning)</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="radio" name="userRole" value="mentor">
                                <span>Mentor (Teaching)</span>
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="margin-top: 20px;">
                        Save Changes
                    </button>
                </form>
            </div>
            
            <div class="info-card" style="max-width: 600px; margin-top: 24px;">
                <h3 style="margin-bottom: 16px;">Account Actions</h3>
                <button class="btn btn-secondary" onclick="if(confirm('Are you sure you want to delete your account? This cannot be undone.')) App.showNotification('Account deletion requested', 'info');">
                    Delete Account
                </button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (AppState.currentUser) {
                document.getElementById('profileName').value = AppState.currentUser.name || '';
                document.getElementById('profileEmail').value = AppState.currentUser.email || '';
                document.getElementById('profileBio').value = AppState.currentUser.bio || '';
                
                const roleRadio = document.querySelector(`input[name="userRole"][value="${AppState.currentUser.role}"]`);
                if (roleRadio) roleRadio.checked = true;
            }
        });
        
        function handleProfileUpdate(e) {
            e.preventDefault();
            
            const name = document.getElementById('profileName').value.trim();
            const bio = document.getElementById('profileBio').value.trim();
            const role = document.querySelector('input[name="userRole"]:checked').value;
            
            if (name.length < 2) {
                App.showNotification('Please enter a valid name', 'error');
                return;
            }
            
            AppState.currentUser.name = name;
            AppState.currentUser.bio = bio;
            AppState.currentUser.role = role;
            
            // Update in users array
            const userIndex = AppState.users.findIndex(u => u.id === AppState.currentUser.id);
            if (userIndex !== -1) {
                AppState.users[userIndex].name = name;
                AppState.users[userIndex].bio = bio;
                AppState.users[userIndex].role = role;
                AppState.saveUsers();
            }
            
            AppState.saveCurrentUser();
            App.showNotification('Profile updated successfully!', 'success');
        }
    </script>
</body>
</html>
